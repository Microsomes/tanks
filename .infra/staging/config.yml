# Server (DigitalOcean)
region: lon1
size: s-1vcpu-1gb
image: ubuntu-24-04-x64
droplet_name: tanks

# Application
app_name: laravel
app_domain: "tanksi.duckdns.org"                      # leave empty to use droplet IP, set a domain later
app_repo: git@github.com:Microsomes/tanks.git
app_branch: master
app_path: /var/www/laravel
deploy_user: deploy
deploy_key_name: laravelstarter
deploy_key_path: "/home/deploy/.ssh/laravelstarter"

# PHP
php_version: "8.5"

# Database
db_name: laravel
db_user: laravel
db_password: "CHANGE_ME_STRONG_PASSWORD"
db_root_password: "CHANGE_ME_ROOT_PASSWORD"

# Redis
redis_password: null

# Mail
mail_mailer: log
mail_host: ""
mail_port: ""
mail_username: ""
mail_password: ""
mail_from_address: "staging@example.com"

# Reverb (WebSocket)
reverb_app_id: staging-app
reverb_app_key: staging-key
reverb_app_secret: staging-secret
reverb_port: 8080

# SSL (Let's Encrypt) — set to false to serve via IP/HTTP only
ssl_enabled: true
ssl_email: tayyan54@gmail.com

# Node.js
node_major_version: 22
